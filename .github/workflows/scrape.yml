name: Weekly data refresh

on:
  schedule:
    # 08:00 UTC = 09:00 Irish time (BST is in effect for this whole window)
    - cron: '0 8 * * 3'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check season cutoff
        id: cutoff
        run: |
          cutoff="2026-09-02"
          today=$(date -u +%Y-%m-%d)
          if [[ "$GITHUB_EVENT_NAME" == "schedule" && "$today" > "$cutoff" ]]; then
            echo "Scheduled run is past the season cutoff ($cutoff) - skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.cutoff.outputs.skip != 'true'
        with:
          node-version: 24

      - name: Install scraper dependencies
        if: steps.cutoff.outputs.skip != 'true'
        working-directory: scraper
        run: npm ci

      - name: Run scraper
        if: steps.cutoff.outputs.skip != 'true'
        working-directory: scraper
        run: npm run scrape

      - name: Commit and push if data changed
        if: steps.cutoff.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scraper/data
          if git diff --cached --quiet; then
            echo "No data changes - nothing to commit."
          else
            git commit -m "Automated data refresh"
            git push
          fi
